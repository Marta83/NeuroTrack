name: neurotrack
description: Base multiplataforma para registro de pacientes y crisis anonimas.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.10.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  pdf: ^3.11.1
  printing: ^5.14.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
